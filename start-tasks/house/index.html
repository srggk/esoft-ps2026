<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Домик - визуализация</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="house">
            <!-- основание дома -->
            <div class="base"></div>

            <!-- крыша (треугольник) -->
            <div class="roof"></div>

            <!-- дымоход -->
            <div class="chimney"></div>

            <!-- круглое окно с перекрестием -->
            <div class="round-window">
                <div class="window-cross"></div>
            </div>

            <!-- декоративный наличник вокруг окна -->
            <div class="window-trim"></div>

            <!-- дверь -->
            <div class="door"></div>

            <!-- элементы ландшафта -->
            <div class="grass"></div>
            <div class="bush"></div>
            <div class="bush bush2"></div>
            <div class="cloud"></div>
        </div>
    </body>
</html>
